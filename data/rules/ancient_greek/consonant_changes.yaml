version: "1.0.0"
updated_at: "2026-04-20"

# Ancient Greek Consonant Change Rules
# Format: each rule records a historically significant consonant development.
#
# Fields:
#   id:         unique rule identifier
#   name_en:    English rule name
#   name_ja:    Japanese rule name
#   input:      source phone(s) in IPA
#   output:     resulting phone(s) in IPA
#   context:    phonological environment (_ = position, # = word boundary,
#                ... = any same-word span, V = any vowel,
#                {a,o} = choice/set of alternatives; null = unconditioned)
#   dialects:   applicable dialect(s) or chronological varieties
#   period:     chronological range
#   references: short-form scholarly references
#   examples:   attested contrastive examples with glosses
# Optional fields:
#   note:       clarification for overlapping environments or special constraints
#
# Schema history:
#   v1.0.0 added top-level `version` (rule schema semantic version, used by
#   API data-version aggregation) and `updated_at` (ISO date for the last rule
#   change in this file; documentation metadata only, not a runtime dependency).
#   Compared with v0.1, the new top-level fields are `version` and `updated_at`.
#   v0.1 fields `name`, `from`, `to`, `dialect`, `weight` were renamed/removed.
#   `weight` (0.0-1.0 rule penalty) was removed because phonological distance
#   is computed entirely from the substitution matrix in distance.py, making
#   per-rule weights redundant and a potential source of double-counting.
#
# Notes on examples:
#   standard       = reference form used for comparison
#   dialect        = contrasting dialectal or chronological form that illustrates the rule
#   reconstruction = reconstructed (unattested) form, prefixed with * per convention;
#                    used for pre-literary changes where no written dialectal contrast exists
#   phonetic       = IPA transcription showing the sound-level change, e.g. "[bíos] → [víos]"
#   meaning        = English gloss
#
#   Required example keys are `standard` and `meaning`.
#   Depending on the rule, examples may additionally supply `dialect`,
#   `reconstruction`, or `phonetic`.

rules:
  - id: CCH-001
    name_en: "Grassmann's Law: aspiration dissimilation"
    name_ja: "グラスマンの法則：帯気音の異化（唇音）"
    input: "pʰ"
    output: "p"
    context: "_...pʰ"
    dialects: [attic, ionic, doric]
    period: "archaic"
    references: ["Buck §68", "Smyth §125"]
    examples:
      - { standard: "πέφυκα", reconstruction: "*φέφυκα", meaning: "have grown (perfect of φύω)" }
    note: "Applies when another aspirate follows later in the same word; `...` uses the standard same-word span described in docs/phonology_rules.md."

  - id: CCH-002
    name_en: "Grassmann's Law: theta dissimilation"
    name_ja: "グラスマンの法則：帯気音の異化（歯音）"
    input: "tʰ"
    output: "t"
    context: "_...tʰ"
    dialects: [attic, ionic, doric]
    period: "archaic"
    references: ["Buck §68", "Smyth §125"]
    examples:
      - { standard: "τίθημι", reconstruction: "*θίθημι", meaning: "I place, put" }
    note: "Applies when another aspirate follows later in the same word; `...` uses the standard same-word span described in docs/phonology_rules.md."

  - id: CCH-003
    name_en: "Intervocalic sigma deletion (Ionic)"
    name_ja: "イオニア方言の母音間 s 脱落"
    input: "s"
    output: ""
    context: "V_V"
    dialects: [ionic]
    period: "archaic"
    references: ["Buck §52", "Smyth §114"]
    examples:
      - { standard: "γένεος", reconstruction: "*γένεσος", meaning: "of a kind (genitive)" }

  - id: CCH-004
    name_en: "Labiovelars -> labials (Attic-Ionic)"
    name_ja: "唇軟口蓋音の唇音化（アッティカ・イオニア方言）"
    input: "kʷ"
    output: "p"
    context: "_{a,o}"
    dialects: [attic, ionic]
    period: "archaic"
    references: ["Buck §122", "Smyth §15"]
    examples:
      - { standard: "ἕπομαι", reconstruction: "*σέκʷομαι", meaning: "follow" }

  - id: CCH-005
    name_en: "Labiovelars -> dentals before front vowels (Attic)"
    name_ja: "前舌母音前における唇軟口蓋音の歯音化（アッティカ方言）"
    input: "kʷ"
    output: "t"
    context: "_{e,i}"
    dialects: [attic]
    period: "archaic"
    references: ["Buck §122", "Smyth §15"]
    examples:
      - { standard: "τίς", reconstruction: "*κʷίς", meaning: "who?" }
    note: "Front-vowel environment only: this Attic rule applies before /e, i/, while CCH-004 covers the distinct back-vowel environments _{a,o}."

  - id: CCH-006
    name_en: "Attic sigma+sigma -> tt"
    name_ja: "アッティカ方言の ss > tt 変化"
    input: "ss"
    output: "tt"
    context: null
    dialects: [attic]
    period: "classical"
    references: ["Buck §81", "Smyth §78"]
    examples:
      - { standard: "θάλασσα", dialect: "θάλαττα", meaning: "sea" }

  - id: CCH-007
    name_en: "Koine spirantization: beta"
    name_ja: "コイネー期の β 摩擦音化"
    input: "b"
    output: "v"
    context: "V_V"
    dialects: [koine]
    period: "hellenistic"
    references: ["Allen Vox Graeca 2.4", "Horrocks 2010: 160-162"]
    examples:
      - { standard: "βίος", phonetic: "[bíos] → [víos]", meaning: "life" }

  - id: CCH-008
    name_en: "Grassmann's Law: kappa aspiration dissimilation"
    name_ja: "グラスマンの法則：帯気音の異化（軟口蓋音）"
    input: "kʰ"
    output: "k"
    context: "_...kʰ"
    dialects: [attic, ionic, doric]
    period: "archaic"
    references: ["Buck §68", "Smyth §125"]
    examples:
      - { standard: "κέχυκα", reconstruction: "*χέχυκα", meaning: "I have poured" }
    note: "Applies when another aspirate follows later in the same word; `...` uses the standard same-word span described in docs/phonology_rules.md."

  - id: CCH-009
    name_en: "Koine spirantization: gamma"
    name_ja: "コイネー期の γ 摩擦音化"
    input: "ɡ"
    output: "ɣ"
    context: "V_V"
    dialects: [koine]
    period: "hellenistic"
    references: ["Allen Vox Graeca 2.4", "Horrocks 2010: 160-162"]
    examples:
      - { standard: "λόγος", phonetic: "[lóɡos] → [lóɣos]", meaning: "word" }

  - id: CCH-010
    name_en: "Koine spirantization: delta"
    name_ja: "コイネー期の δ 摩擦音化"
    input: "d"
    output: "ð"
    context: "V_V"
    dialects: [koine]
    period: "hellenistic"
    references: ["Allen Vox Graeca 2.4", "Horrocks 2010: 160-162"]
    examples:
      - { standard: "ἀδελφός", phonetic: "[adelpʰós] → [aðelpʰós]", meaning: "brother" }

  - id: CCH-011
    name_en: "Koine spirantization: phi"
    name_ja: "コイネー期の φ 摩擦音化"
    input: "pʰ"
    output: "f"
    context: null
    dialects: [koine]
    period: "hellenistic"
    references: ["Allen Vox Graeca 2.4", "Horrocks 2010: 160-162"]
    examples:
      - { standard: "φῶς", phonetic: "[pʰɔːs] → [fɔːs]", meaning: "light" }
    note: "Applies in Hellenistic/Koine Greek and supersedes the earlier aspirate dissimilation path of CCH-001 in koine contexts."

  - id: CCH-012
    name_en: "Koine spirantization: theta"
    name_ja: "コイネー期の θ 摩擦音化"
    input: "tʰ"
    output: "θ"
    context: null
    dialects: [koine]
    period: "hellenistic"
    references: ["Allen Vox Graeca 2.4", "Horrocks 2010: 160-162"]
    examples:
      - { standard: "θεός", phonetic: "[tʰeós] → [θeós]", meaning: "god" }
    note: "Applies in Hellenistic/Koine Greek and supersedes the earlier aspirate dissimilation path of CCH-002 in koine contexts."

  - id: CCH-013
    name_en: "Koine spirantization: chi"
    name_ja: "コイネー期の χ 摩擦音化"
    input: "kʰ"
    output: "x"
    context: null
    dialects: [koine]
    period: "hellenistic"
    references: ["Allen Vox Graeca 2.4", "Horrocks 2010: 160-162"]
    examples:
      - { standard: "χείρ", phonetic: "[kʰeːr] → [xeːr]", meaning: "hand" }
    note: "Applies in Hellenistic/Koine Greek and supersedes the earlier aspirate dissimilation path of CCH-008 in koine contexts."

  - id: CCH-014
    name_en: "Place assimilation of nu to labials"
    name_ja: "唇音前における ν の調音点同化"
    input: "n"
    output: "m"
    context: "_{p,b,pʰ}"
    dialects: [attic, ionic, doric, koine]
    period: "archaic, classical, and hellenistic periods"
    references: ["Smyth §83", "Buck §85"]
    examples:
      - { standard: "συμπάσχω", reconstruction: "*συνπάσχω", meaning: "suffer with" }

  - id: CCH-015
    name_en: "Runtime velar assimilation of nu"
    name_ja: "Proteus実行時IPAにおける ν の軟口蓋音前同化"
    input: "n"
    output: "ɡ"
    context: "_{k,ɡ,kʰ}"
    dialects: [attic, ionic, doric, koine]
    period: "archaic, classical, and hellenistic periods"
    references: ["Smyth §83", "Buck §85"]
    examples:
      - { standard: "ἄγκυρα", reconstruction: "*ἄνκυρα", meaning: "anchor" }
    note: "Historical velar nasal assimilation is approximated in Proteus runtime IPA as `n -> ɡ`, because the current converter and packaged lexicon encode forms like ἄγκυρα as /aɡkyra/ rather than with /ŋ/."
