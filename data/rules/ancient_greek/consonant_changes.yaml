# Ancient Greek Consonant Change Rules
# Format: each rule defines a phonological change with context and weight
#
# Fields:
#   id:       unique rule identifier
#   name:     human-readable name
#   from:     source phone(s) in IPA
#   to:       target phone(s) in IPA
#   context:  phonological environment (_ = position, # = word boundary,
#              ... = any same-word span, V = any vowel,
#              {a,o} = choice/set of alternatives)
#   dialect:  applicable dialect(s)
#   period:   chronological period
#   weight:   distance penalty (0.0 = free alternation, 1.0 = major change)
#   priority: optional deterministic precedence (higher wins)
#   note:     optional clarification for overlapping environments

rules:
  - id: CCH-001
    name: "Grassmann's Law: aspiration dissimilation"
    from: "pʰ"
    to: "p"
    context: "_...pʰ"
    dialect: [attic, ionic, doric]
    period: archaic
    weight: 0.3
    note: "Applies when another aspirate follows later in the same word; `...` uses the standard same-word span described in docs/phonology_rules.md."

  - id: CCH-002
    name: "Grassmann's Law: theta dissimilation"
    from: "tʰ"
    to: "t"
    context: "_...tʰ"
    dialect: [attic, ionic, doric]
    period: archaic
    weight: 0.3
    note: "Applies when another aspirate follows later in the same word; `...` uses the standard same-word span described in docs/phonology_rules.md."

  - id: CCH-003
    name: "Intervocalic sigma deletion (Ionic)"
    from: "s"
    to: ""
    context: "V_V"
    dialect: [ionic]
    period: archaic
    weight: 0.5

  - id: CCH-004
    name: "Labiovelars -> labials (Attic-Ionic)"
    from: "kʷ"
    to: "p"
    context: "_{a,o}"
    dialect: [attic, ionic]
    period: archaic
    weight: 0.6

  - id: CCH-005
    name: "Labiovelars -> dentals before front vowels (Attic)"
    from: "kʷ"
    to: "t"
    context: "_{e,i}"
    dialect: [attic]
    period: archaic
    weight: 0.6
    note: "Front-vowel environment only: this Attic rule applies before /e, i/, while CCH-004 covers the distinct back-vowel environments _{a,o}."

  - id: CCH-006
    name: "Attic sigma+sigma -> tt"
    from: "ss"
    to: "tt"
    context: null
    dialect: [attic]
    period: classical
    weight: 0.4

  - id: CCH-007
    name: "Koine spirantization: beta"
    from: "b"
    to: "v"
    context: "V_V"
    dialect: [koine]
    period: hellenistic
    weight: 0.5
