# Ancient Greek Vowel Shift Rules
# Format: each rule defines a phonological change with context and weight
#
# Fields:
#   id:       unique rule identifier
#   name:     human-readable name
#   from:     source phone(s) in IPA
#   to:       target phone(s) in IPA
#   context:  phonological environment (null = unconditioned)
#   dialect:  applicable dialect(s)
#   period:   chronological period
#   weight:   distance penalty (0.0 = free alternation, 1.0 = major change)

rules:
  - id: VSH-001
    name: "Attic eta < Ionic eta"
    from: "aː"
    to: "ɛː"
    context: null
    dialect: [ionic, attic]
    period: classical
    weight: 0.3

  - id: VSH-002
    name: "Doric alpha retention"
    from: "ɛː"
    to: "aː"
    context: null
    dialect: [doric]
    period: classical
    weight: 0.3

  - id: VSH-003
    name: "Vowel lengthening before nasal + consonant"
    from: "a"
    to: "aː"
    context: "_NC"
    dialect: [attic]
    period: classical
    weight: 0.4

  - id: VSH-004
    name: "Quantitative metathesis (Ionic)"
    from: "eːo"
    to: "eoː"
    context: null
    dialect: [ionic]
    period: archaic
    weight: 0.5

  - id: VSH-005
    name: "Koine iotacism: eta -> i"
    from: "ɛː"
    to: "i"
    context: null
    dialect: [koine]
    period: hellenistic
    weight: 0.6
