    input_form: "θάλαττα"
    language: "ancient_greek"
    dialect_hint: "attic"
    max_candidates: 10
    expected_candidates:
      - headword: "θάλασσα"
        acceptable_forms: []
        note: "Attic double-tau spelling should recover the sigma-sigma headword via the documented consonant correspondence."
    reasoning: >
      The Attic tt for ss correspondence is a textbook consonant alternation
      and the first consonant-rule case in this dataset. It checks that
      CCH-006 recovers the packaged sigma-sigma headword from the common
      Attic literary spelling.
    source_notes:
      - source_id: "proteus-rule-cch-006-thalatta"
        short_citation: "Proteus rule seed, CCH-006"
        note: "Rule-backed public evaluator seed; direct source evidence remains outside this dataset."
    existing_search_failure:
      tool: "exact string search"
      query: "θάλαττα"
      failure_type: "exact_search_miss"
      notes: "Exact matching does not connect the Attic tt spelling to the sigma-sigma headword."
    manual_search:
      checked_by: "project"
      checked_at: "2026-07-04"
      summary: "The intended headword is the packaged supplemental lemma θάλασσα; the tt variant is not a separate packaged lemma."
    tool_assisted_search:
      checked_at: "2026-07-04"
      summary: "Proteus returned θάλασσα at rank 2 via CCH-006; the unrelated lemma βλάττα outranked it at rank 1."
    review_status: "collected"
    reviewer: ""
    false_positive_notes:
      - "βλάττα outranks θάλασσα at rank 1; ranking of short OBS-edit competitors above rule-backed hits needs review."
    false_negative_notes:
      - "If θάλασσα is absent, the CCH-006 tt-to-ss correspondence has regressed."

