        note: "Accentless input should still recover the accented packaged lemma."
    reasoning: >
      Search users often enter unaccented forms. This semi-real case verifies
      that the evaluator tracks recovery of the normalized accented headword
      without claiming a citation-ready inscriptional reading.
    source_notes:
      - source_id: "lsj-logos-accentless-control"
