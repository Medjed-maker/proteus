    language: "ancient_greek"
    dialect_hint: "attic"
    max_candidates: 10
    expected_candidates:
      - headword: "λόγος"
        acceptable_forms: []
        note: "Accentless input should still recover the accented packaged lemma."
    reasoning: >
      Search users often enter unaccented forms. This semi-real case verifies
      that the evaluator tracks recovery of the normalized accented headword
      without claiming a citation-ready inscriptional reading.
    source_notes:
      - source_id: "lsj-logos-accentless-control"
        short_citation: "LSJ, λόγος"
        note: "Common public lemma used for an accentless-input evaluator case; no source text is reproduced."
    existing_search_failure:
      tool: "exact string search"
      query: "λογος"
      failure_type: "exact_search_miss"
      notes: "Exact matching can miss the accented lemma when the user enters an unaccented form."
    manual_search:
      checked_by: "project"
      checked_at: "2026-06-29"
      summary: "The intended headword is the packaged lemma λόγος."
    tool_assisted_search:
      checked_at: "2026-06-29"
      summary: "Proteus should return λόγος within the requested top-N for the unaccented input."
    review_status: "collected"
    reviewer: ""
    false_positive_notes:
      - "Evaluator reports should show whether near accent variants outrank λόγος."
    false_negative_notes:
      - "If λόγος is absent, accentless input handling may have regressed."

