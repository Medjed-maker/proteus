    reasoning: >
      The Doric-style form differs from the packaged headword in two vowels
      at once, so recovery requires stacking the stem-internal long-alpha
      correspondence with the feminine-ending alternation. This is the
      hardest rule-backed vowel case in the public seed.
    source_notes:
      - source_id: "proteus-rule-vsh-002-selana"
        short_citation: "Proteus rule seed, VSH-002 with MPH-006"
        note: "Rule-backed public evaluator seed; direct source evidence remains outside this dataset."
