  - case_id: "hq-ag-0015"
    visibility: "public_seed"
    input_form: "χώρη"
    language: "ancient_greek"
    dialect_hint: "attic"
    max_candidates: 10
    expected_candidates:
      - headword: "χώρα"
        acceptable_forms: []
        note: "Ionic-style eta after rho should map back to the Attic alpha headword."
    reasoning: >
      Attic keeps long alpha after e, i, or r where Ionic generalized eta, so
      an Ionic-style eta form is a documented correspondence target. The
      packaged MPH-003 suffix rule already explains the lemma-final alpha to
      query-final eta correspondence. The historical false negative occurred
      because the large tied consonant-skeleton seed group exhausted the
      bounded Stage 2 window before this same-length lemma could be scored.
    source_notes:
      - source_id: "proteus-rule-seeds-hq-ag-0015"
        short_citation: "Proteus rule seeds, MPH-003 with VSH-001 and VSH-009"
        note: "Rule-backed public evaluator seed; direct source evidence remains outside this dataset."
    existing_search_failure:
      tool: "exact string search"
      query: "χώρη"
      failure_type: "exact_search_miss"
      notes: "Exact matching does not connect the Ionic-style eta form to the Attic alpha headword."
    manual_search:
      checked_by: "project"
      checked_at: "2026-07-04"
      summary: "The intended headword is the packaged lemma χώρα."
    tool_assisted_search:
      checked_at: "2026-07-15"
      summary: "Proteus returns χώρα at rank 1 with MPH-003 after exact-length Stage 2 supplementation was prioritized."
    review_status: "collected"
    reviewer: ""
    false_positive_notes: []
    false_negative_notes: []

