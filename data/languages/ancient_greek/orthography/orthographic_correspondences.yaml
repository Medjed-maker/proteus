_meta:
  status: provisional
  review_status: not_expert_reviewed
  citation_ready: false
  references:
    - "Buck, Introduction to the Study of the Greek Dialects, section 4 orthography notes."
  note: "Small curated runtime seed set for orthographic notes."
  notation:
    pre_reform_spelling: >
      Pure Greek-script string reflecting the pre-403/2 BCE Attic inscriptional
      convention, where a single Greek omicron (Ο) or epsilon (Ε) stands for an
      etymologically long /oː/ or /eː/ (e.g. "παιδίο" for later "παιδίου").
      Keep the Greek letters as-is; do NOT splice in the Latin macron vowels
      "ō" (U+014D) or "ē" (U+0113). Long-vowel information is carried by the
      paired `pre_reform_romanization` field, not by the Greek string. When the
      search query word already matches the pre-reform form, this field may
      hold the same value as the entry's `original`. Strings are NFC-normalized
      at load time by `_parser.py`.
    pre_reform_romanization: >
      Plain ASCII + macron transliteration of `pre_reform_spelling` where the
      etymological long /oː/ and /eː/ are spelled "ō" (U+014D) and "ē" (U+0113)
      respectively (e.g. "paidiō"). This is the only place the macron lives;
      it is intentionally absent from `pre_reform_spelling`. Distinct from
      `romanization`, which always reflects the post-reform normalized form.
  tag_vocabulary:
    beginner_aid: "Emit a short reading-aid note alongside the correspondence."
    inscriptional: "Form attested in (or modeled on) ancient Greek inscriptions."
    attic_historical_context: >
      Opt in to a cautious pre-403/2 BCE Attic context message on the
      correspondence note. Apply only to entries whose orthographic shape
      reflects the pre-reform Attic inscriptional convention (single Ο/Ε for
      long /oː/, /eː/, etc.). Mutually exclusive with the `pre_403_2_attic`
      kind/tag, which already carries its own historical note. Consumed by
      `_uses_attic_historical_context` in `_messages.py`.

entries:
  - original: "παιδίο"
    normalized: "παιδίου"
    candidate_headwords: ["παιδίον"]
    romanization: "paidiou"
    pre_reform_spelling: "παιδίο"
    pre_reform_romanization: "paidiō"
    kind: "orthographic_correspondence"
