<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proteus — Ancient Greek Phonological Search</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Minimal base styles — placeholder until real UI is built            */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Palatino Linotype", Palatino, "Book Antiqua", serif;
      background: #faf8f3;
      color: #2c2a24;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2.5rem; letter-spacing: 0.04em; }
    header p  { color: #6b6557; font-size: 1rem; margin-top: 0.4rem; }

    .search-box {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 560px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #query {
      flex: 1;
      font-size: 1.4rem;
      font-family: "GFS Didot", "Palatino Linotype", serif;
      padding: 0.5rem 0.8rem;
      border: 1px solid #c4b99a;
      border-radius: 4px;
      background: #fff;
    }

    button {
      padding: 0.5rem 1.2rem;
      font-size: 1rem;
      background: #5a4e38;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #3d3424; }
    button:disabled,
    button[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      pointer-events: none;
    }

    #results {
      margin-top: 2rem;
      width: 100%;
      max-width: 720px;
    }

    .hit {
      background: #fff;
      border: 1px solid #ddd6c1;
      border-radius: 6px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }

    .hit-headword  { font-size: 1.5rem; }
    .hit-ipa       { color: #6b6557; font-size: 0.9rem; margin-top: 0.2rem; }
    .hit-distance  { float: right; font-size: 0.85rem; color: #8c7d62; }
    .hit-explain   { margin-top: 0.8rem; font-size: 0.9rem; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>Πρωτεύς · Proteus</h1>
    <p>Ancient Greek phonological search engine</p>
  </header>

  <form id="searchForm" class="search-box">
    <label for="query" class="visually-hidden">Search query</label>
    <input id="query" type="text" placeholder="ἄνθρωπος" autocomplete="off" />
    <button id="searchBtn" type="submit">Search</button>
  </form>

  <div id="results" aria-live="polite" role="region" aria-label="Search results"></div>

  <script>
    function renderStatusMessage(message, color = "") {
      const container = document.getElementById("results");
      container.replaceChildren();

      const paragraph = document.createElement("p");
      paragraph.textContent = message;
      if (color) {
        paragraph.style.color = color;
      }
      container.appendChild(paragraph);
    }

    function setLoadingState(isLoading) {
      const queryInput = document.getElementById("query");
      const searchButton = document.getElementById("searchBtn");

      queryInput.disabled = isLoading;
      searchButton.disabled = isLoading;
    }

    async function runSearch(event) {
      if (event) {
        event.preventDefault();
      }

      const queryInput = document.getElementById("query");
      const query = queryInput.value.trim();
      if (!query) {
        renderStatusMessage("Please enter a search term.");
        return;
      }

      setLoadingState(true);
      renderStatusMessage("Loading...", "blue");

      try {
        const res = await fetch("/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, dialect: "attic", max_results: 20 }),
        });

        if (!res.ok) {
          let body = "";
          try {
            body = (await res.text()).trim();
          } catch (readError) {
            console.error("Failed to read error response body:", readError);
          }

          const errorMessage = `Error: ${res.status} ${res.statusText}${
            body ? `: ${body}` : ""
          }`;
          renderStatusMessage(errorMessage, "red");
          return;
        }

        const data = await res.json();
        renderResults(data);
      } catch (error) {
        console.error(error);
        const message = error instanceof Error ? error.message : String(error);
        renderStatusMessage(`Error: ${message}`, "red");
      } finally {
        setLoadingState(false);
      }
    }

    function renderResults(data) {
      const container = document.getElementById("results");
      container.replaceChildren();

      if (
        typeof data !== "object" ||
        data === null ||
        !Array.isArray(data.hits)
      ) {
        console.error("Unexpected search payload:", data);
        renderStatusMessage("No results found.");
        return;
      }

      if (!data.hits.length) {
        renderStatusMessage("No results found.");
        return;
      }

      data.hits.forEach(hit => {
        const safeHit = typeof hit === "object" && hit !== null ? hit : {};
        const safeDistance = Number.isFinite(safeHit.distance)
          ? `Δ ${safeHit.distance.toFixed(3)}`
          : "Δ —";
        const safeHeadword = typeof safeHit.headword === "string"
          ? safeHit.headword
          : "N/A";
        const safeIpa = typeof safeHit.ipa === "string" && safeHit.ipa
          ? safeHit.ipa
          : "N/A";
        const safeExplanation = typeof safeHit.explanation === "string"
          ? safeHit.explanation
          : "";

        const card = document.createElement("div");
        card.className = "hit";

        const distance = document.createElement("span");
        distance.className = "hit-distance";
        distance.textContent = safeDistance;

        const headword = document.createElement("div");
        headword.className = "hit-headword";
        headword.textContent = safeHeadword;

        const ipa = document.createElement("div");
        ipa.className = "hit-ipa";
        ipa.textContent = safeIpa === "N/A" ? safeIpa : `/${safeIpa}/`;

        const explanation = document.createElement("div");
        explanation.className = "hit-explain";
        explanation.textContent = safeExplanation;

        card.appendChild(distance);
        card.appendChild(headword);
        card.appendChild(ipa);
        card.appendChild(explanation);
        container.appendChild(card);
      });
    }

    document.getElementById("searchForm").addEventListener("submit", runSearch);
  </script>
</body>
</html>
