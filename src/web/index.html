<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proteus — Ancient Greek Phonological Search</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="font-serif bg-parchment-50 text-ink min-h-screen flex flex-col items-center py-12 px-4">

  <header class="text-center mb-10">
    <h1 class="text-4xl tracking-wide font-bold">Πρωτεύς · Proteus</h1>
    <p class="text-ink-light text-base mt-1">Ancient Greek phonological search engine</p>
  </header>

  <main class="w-full max-w-3xl">
    <form id="searchForm" class="flex gap-3 max-w-xl mx-auto">
      <label for="query" class="sr-only">Search query</label>
      <input id="query" type="text"
        placeholder="ἄνθρωπος"
        autocomplete="off"
        class="flex-1 text-2xl font-serif py-3 px-4 border border-parchment-200 rounded-lg bg-white
               focus:outline-none focus:ring-2 focus:ring-accent/30" />
      <button id="searchBtn" type="submit"
        class="py-3 px-6 text-base font-medium bg-accent text-white border-none rounded-lg cursor-pointer
               transition-colors duration-150 hover:bg-accent-hover
               disabled:opacity-50 disabled:cursor-not-allowed disabled:pointer-events-none">
        Search
      </button>
    </form>

    <div id="results" class="mt-8" aria-live="polite" role="region" aria-label="Search results"></div>
  </main>

  <footer class="mt-auto text-center text-xs text-ink-light">
    Lexicon data from
    <a href="https://www.perseus.tufts.edu/" class="underline hover:text-ink"
       target="_blank" rel="noopener noreferrer">Perseus Digital Library<span class="sr-only"> (opens in a new tab)</span></a>
    (LSJ XML in
    <a href="https://github.com/PerseusDL/lexica" class="underline hover:text-ink"
       target="_blank" rel="noopener noreferrer">PerseusDL/lexica<span class="sr-only"> (opens in a new tab)</span></a>), licensed
    <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="underline hover:text-ink"
       target="_blank" rel="noopener noreferrer">CC BY-SA 4.0<span class="sr-only"> (opens in a new tab)</span></a>.
  </footer>

  <script>
    /* ------------------------------------------------------------------ */
    /* Status & loading helpers                                            */
    /* ------------------------------------------------------------------ */

    const STATUS_MESSAGE_COLORS = {
      red: "text-red-700",
      accent: "text-accent",
      "ink-light": "text-ink-light"
    };

    function renderStatusMessage(message, color = "ink-light") {
      const el = document.getElementById("results");
      el.replaceChildren();
      const p = document.createElement("p");
      p.textContent = message;
      p.className = "text-center " + (STATUS_MESSAGE_COLORS[color] || STATUS_MESSAGE_COLORS["ink-light"]);
      el.appendChild(p);
    }

    function setLoadingState(isLoading) {
      document.getElementById("query").disabled = isLoading;
      document.getElementById("searchBtn").disabled = isLoading;
    }

    // Wildcard marker characters accepted in partial-form queries. Kept in
    // sync with _PARTIAL_QUERY_MARKERS in src/phonology/search.py so the
    // frontend and server agree on when a query is a Partial-form. Includes
    // ASCII hyphen/asterisk/tilde plus Unicode dashes that users commonly paste
    // from word processors, locale keyboards, or copy-paste.
    const WILDCARD_CHARS = "\\-*~\\u2010\\u2011\\u2012\\u2013\\u2014\\u2015\\u2212\\uFF0D";
    function wildcardRegexGlobal() {
      // Return a fresh RegExp each call to avoid shared lastIndex state on /g flag.
      return new RegExp("[" + WILDCARD_CHARS + "]", "g");
    }

    function countWildcards(query) {
      return (query.match(wildcardRegexGlobal()) || []).length;
    }

    function hasOnlyWildcardMarker(query) {
      return countWildcards(query) === 1 && !query.replace(wildcardRegexGlobal(), "").trim();
    }

    /* ------------------------------------------------------------------ */
    /* Search                                                              */
    /* ------------------------------------------------------------------ */

    async function runSearch(event) {
      if (event) event.preventDefault();

      const query = document.getElementById("query").value.trim();
      if (!query) {
        renderStatusMessage("Please enter a search term.");
        return;
      }

      const wildcardCount = countWildcards(query);
      if (wildcardCount > 1) {
        renderStatusMessage("Only one wildcard marker (-, *, or ~) is allowed per query.");
        return;
      }
      if (hasOnlyWildcardMarker(query)) {
        renderStatusMessage("Please enter a search term alongside the wildcard marker.");
        return;
      }

      setLoadingState(true);
      renderStatusMessage("Searching\u2026", "accent");

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 30000);

      try {
        const res = await fetch("/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, dialect: "attic", max_results: 20 }),
          signal: controller.signal,
        });

        clearTimeout(timeoutId);

        if (!res.ok) {
          let body = "";
          try { body = (await res.text()).trim(); } catch (_) {}
          renderStatusMessage("Error: " + res.status + " " + res.statusText + (body ? ": " + body : ""), "red");
          return;
        }

        renderResults(await res.json());
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === "AbortError") {
          renderStatusMessage("Request timed out.", "red");
        } else {
          renderStatusMessage("Error: " + (err instanceof Error ? err.message : String(err)), "red");
        }
      } finally {
        setLoadingState(false);
      }
    }

    /* ------------------------------------------------------------------ */
    /* Result rendering                                                    */
    /* ------------------------------------------------------------------ */

    const DETAILED_CARD_THRESHOLD = 3;

    // Client-side fallback for query-mode classification.  The server
    // returns query_mode in the response, so this is only reached when
    // data.query_mode is absent (e.g. older API versions).  The logic
    // intentionally mirrors classify_query_mode() in search.py.
    function classifyQueryMode(query) {
      const normalized = String(query || "").trim().normalize("NFC");
      if (!normalized) return "Short-query";
      const wildcardCount = countWildcards(normalized);
      if (wildcardCount === 1 && !hasOnlyWildcardMarker(normalized)) return "Partial-form";
      // Strip whitespace/punctuation plus the full wildcard set so the short-
      // query length check matches the server even when the query contains
      // Unicode dashes that aren't valid wildcard markers on their own.
      const stripRegex = new RegExp("[\\s._" + WILDCARD_CHARS + "]", "g");
      const stripped = normalized.replace(stripRegex, "");
      const charCount = Array.from(stripped).length;
      if (charCount > 0 && charCount <= 3) return "Short-query";
      return "Full-form";
    }

    function describeQueryMode(mode, query) {
      const resolved = mode || classifyQueryMode(query);
      switch (resolved) {
        case "Partial-form":
          return {
            label: "Partial form mode",
            detail: "Input includes a single wildcard; full wildcard and fragment matches are ranked before raw confidence.",
            badgeClass: "bg-amber-100 text-amber-800"
          };
        case "Short-query":
          return {
            label: "Short query mode",
            detail: "Very short inputs broaden the search space; exact and rule-supported matches can remain despite low confidence.",
            badgeClass: "bg-orange-100 text-orange-800"
          };
        default:
          return {
            label: "Full form mode",
            detail: "Results are ranked as full-form phonological candidates.",
            badgeClass: "bg-emerald-100 text-emerald-800"
          };
      }
    }

    function confidenceColor(c) {
      if (c >= 0.9) return ["bg-emerald-100 text-emerald-800", "bg-emerald-500"];
      if (c >= 0.7) return ["bg-amber-100 text-amber-800",     "bg-amber-500"];
      if (c >= 0.5) return ["bg-orange-100 text-orange-800",   "bg-orange-500"];
      return                ["bg-red-100 text-red-800",         "bg-red-500"];
    }

    function renderConfidenceBadge(confidence) {
      confidence = Math.max(0, Math.min(1, confidence));
      const pct = (confidence * 100).toFixed(1);
      const [badgeCls, barCls] = confidenceColor(confidence);

      const wrapper = document.createElement("div");
      wrapper.className = "flex items-center gap-2 shrink-0";

      const badge = document.createElement("span");
      badge.className = "text-xs font-medium px-2 py-0.5 rounded-full " + badgeCls;
      badge.textContent = pct + "%";

      const barOuter = document.createElement("div");
      barOuter.className = "w-16 h-1.5 rounded-full bg-parchment-200 overflow-hidden";
      const barInner = document.createElement("div");
      barInner.className = "h-full rounded-full " + barCls;
      barInner.style.width = pct + "%";
      barOuter.appendChild(barInner);

      wrapper.appendChild(badge);
      wrapper.appendChild(barOuter);
      return wrapper;
    }

    function matchTypeColor(matchType) {
      switch (matchType) {
        case "Exact":
          return "bg-emerald-100 text-emerald-800";
        case "Rule-based":
          return "bg-blue-100 text-blue-800";
        case "Distance-only":
          return "bg-amber-100 text-amber-800";
        case "Low-confidence":
          return "bg-red-100 text-red-800";
        default:
          return "bg-parchment-200 text-ink";
      }
    }

    function renderMetaBadge(label, value, tone = "neutral") {
      const wrapper = document.createElement("div");
      wrapper.className = "flex items-center gap-2 flex-wrap";

      const labelEl = document.createElement("span");
      labelEl.className = "text-xs uppercase tracking-wide text-ink-muted";
      labelEl.textContent = label;

      const valueEl = document.createElement("span");
      valueEl.className = "text-xs font-medium px-2 py-0.5 rounded-full " +
        (tone === "match" ? matchTypeColor(value) : "bg-parchment-100 text-ink");
      valueEl.textContent = value;

      wrapper.appendChild(labelEl);
      wrapper.appendChild(valueEl);
      return wrapper;
    }

    function hasRuleSupport(hit) {
      if (typeof hit.rule_support === "boolean") return hit.rule_support;
      return (hit.applied_rule_count ?? 0) > 0;
    }

    function isSupportedCandidate(hit) {
      if (hit.candidate_bucket === "Supported") return true;
      if (hit.candidate_bucket === "Exploratory") return false;
      const matchType = hit.match_type || "Distance-only";
      const uncertainty = hit.uncertainty || "High";
      return matchType === "Exact" || matchType === "Rule-based" || uncertainty === "Low";
    }

    function renderDialectBadges(attribution) {
      const container = document.createElement("div");
      container.className = "flex flex-wrap gap-1.5 mt-2";

      if (!attribution) return container;

      attribution.split(";").forEach((segment) => {
        segment = segment.trim();
        if (!segment) return;
        const pill = document.createElement("span");
        pill.className = "text-xs px-2 py-0.5 rounded-full bg-parchment-200 text-ink-light";
        pill.textContent = segment;
        container.appendChild(pill);
      });
      return container;
    }

    function renderSectionTitle(text) {
      const title = document.createElement("h4");
      title.className = "text-sm font-medium text-ink mt-3";
      title.textContent = text;
      return title;
    }

    function renderGroupHeader(title, description) {
      const wrapper = document.createElement("section");
      wrapper.className = "mb-4";

      const heading = document.createElement("h3");
      heading.className = "text-sm uppercase tracking-wide text-ink-muted";
      heading.textContent = title;

      const body = document.createElement("p");
      body.className = "mt-1 text-sm text-ink-light leading-relaxed";
      body.textContent = description;

      wrapper.appendChild(heading);
      wrapper.appendChild(body);
      return wrapper;
    }

    function describeExploratoryGroup(queryMode) {
      switch (queryMode) {
        case "Short-query":
          return "Very short inputs broaden the search space; exploratory candidates are shown for quick inspection.";
        case "Partial-form":
          return "Single-wildcard queries increase exploratory matches; these candidates are shown for review.";
        default:
          return "Exploratory candidates are shown for inspection.";
      }
    }

    function renderExploratorySection(queryMode, items) {
      const details = document.createElement("details");
      details.className = "mb-4";
      details.open = true;

      const summary = document.createElement("summary");
      summary.className = "cursor-pointer select-none list-item text-sm uppercase tracking-wide text-ink-muted";
      summary.textContent = "Exploratory candidates (" + items.length + ")";
      details.appendChild(summary);

      const body = document.createElement("div");
      body.className = "mt-3";

      const hint = document.createElement("p");
      hint.className = "mb-3 text-sm text-ink-light leading-relaxed";
      hint.textContent = describeExploratoryGroup(queryMode);
      body.appendChild(hint);

      items.forEach(({ hit, index }, groupIndex) => {
        body.appendChild(
          groupIndex < DETAILED_CARD_THRESHOLD
            ? renderDetailedCard(hit, index)
            : renderCompactCard(hit, index)
        );
      });

      details.appendChild(body);
      return details;
    }

    function renderQueryModeBanner(query, queryMode) {
      const mode = describeQueryMode(queryMode, query);
      const banner = document.createElement("div");
      banner.className = "mb-4 rounded-xl border border-parchment-200 bg-white p-3 shadow-sm";

      const row = document.createElement("div");
      row.className = "flex flex-wrap items-center gap-2";

      const label = document.createElement("span");
      label.className = "text-xs uppercase tracking-wide text-ink-muted";
      label.textContent = "Query mode";

      const badge = document.createElement("span");
      badge.className = "text-xs font-medium px-2 py-0.5 rounded-full " + mode.badgeClass;
      badge.textContent = mode.label;

      const detail = document.createElement("p");
      detail.className = "mt-2 text-sm text-ink-light leading-relaxed";
      detail.textContent = mode.detail;

      row.appendChild(label);
      row.appendChild(badge);
      banner.appendChild(row);
      banner.appendChild(detail);
      return banner;
    }

    function renderAlignmentBlock(text) {
      if (!text) return null;
      const pre = document.createElement("pre");
      pre.className = "mt-3 p-3 rounded-lg bg-parchment-100 text-sm font-mono overflow-x-auto leading-relaxed";
      pre.textContent = text;
      return pre;
    }

    function normalizeRuleId(rule) {
      return String(rule.rule_id ?? "");
    }

    function isObservedRule(rule) {
      return normalizeRuleId(rule).startsWith("OBS-");
    }

    function preferredRuleLabel(rule) {
      return (rule.rule_name_en || rule.rule_name || normalizeRuleId(rule)).trim();
    }

    function renderRuleRows(rules) {
      const list = document.createElement("div");
      list.className = "mt-2 space-y-1.5";

      rules.forEach((rule) => {
        const row = document.createElement("div");
        row.className = "text-sm text-ink";

        const line = document.createElement("div");
        line.className = "flex flex-wrap items-center gap-x-2";

        const label = document.createElement("span");
        label.className = "font-medium";
        label.textContent = preferredRuleLabel(rule);

        const phones = document.createElement("span");
        phones.className = "font-mono text-ink-light";
        phones.textContent = "/" + (rule.from_phone || "\u2205") + "/ \u2192 /" + (rule.to_phone || "\u2205") + "/";

        const pos = document.createElement("span");
        pos.className = "text-xs text-ink-muted";
        pos.textContent = "position " + (rule.position ?? "-");

        line.appendChild(label);
        line.appendChild(phones);
        line.appendChild(pos);
        row.appendChild(line);
        list.appendChild(row);
      });

      return list;
    }

    function renderWhyCandidate(items) {
      const list = document.createElement("ul");
      list.className = "mt-2 pl-4 text-sm text-ink-light leading-relaxed list-disc";
      (items || []).forEach((item) => {
        const li = document.createElement("li");
        li.className = "mb-1";
        li.textContent = item;
        list.appendChild(li);
      });
      return list;
    }

    function renderAlignmentDetails(hit) {
      const details = document.createElement("details");
      details.className = "mt-2";

      const summary = document.createElement("summary");
      summary.className = "cursor-pointer text-sm font-medium text-accent select-none list-item hover:text-accent-hover";
      summary.textContent = "Show full alignment";
      details.appendChild(summary);

      const pre = renderAlignmentBlock(hit.alignment_visualization);
      if (pre) details.appendChild(pre);

      return details;
    }

    function renderNotesDetails(hit) {
      const details = document.createElement("details");
      details.className = "mt-3";

      const summary = document.createElement("summary");
      summary.className = "cursor-pointer text-sm font-medium text-accent select-none list-item hover:text-accent-hover";
      summary.textContent = "Notes";
      details.appendChild(summary);

      const text = document.createElement("p");
      text.className = "mt-2 text-sm text-ink-light leading-relaxed";
      text.textContent = hit.explanation || "No additional notes.";
      details.appendChild(text);

      return details;
    }

    function splitRules(hit) {
      const rules = Array.isArray(hit.rules_applied) ? hit.rules_applied : [];
      return {
        explicit: rules.filter((rule) => !isObservedRule(rule)),
        observed: rules.filter((rule) => isObservedRule(rule)),
      };
    }

    function appendCardBody(container, hit, { explicit, observed }) {
      container.appendChild(renderSectionTitle("Difference summary"));
      const differenceSummary = document.createElement("p");
      differenceSummary.className = "mt-2 text-sm text-ink-light";
      differenceSummary.textContent = hit.alignment_summary || "Differences visible in full alignment.";
      container.appendChild(differenceSummary);

      container.appendChild(renderSectionTitle("Matched rules (" + (hit.applied_rule_count ?? explicit.length) + ")"));
      if (explicit.length) {
        container.appendChild(renderRuleRows(explicit));
      } else {
        const empty = document.createElement("p");
        empty.className = "mt-2 text-sm text-ink-light";
        empty.textContent = "No catalogued rule support matched.";
        container.appendChild(empty);
      }

      if ((hit.observed_change_count ?? observed.length) > 0 && observed.length) {
        container.appendChild(renderSectionTitle("Uncatalogued differences (" + (hit.observed_change_count ?? observed.length) + ")"));
        container.appendChild(renderRuleRows(observed));
      }

      container.appendChild(renderSectionTitle("Alignment"));
      const summary = document.createElement("p");
      summary.className = "mt-2 text-sm text-ink-light";
      summary.textContent = hit.alignment_visualization
        ? "Inspect the full alignment for segment-by-segment detail."
        : "Full alignment unavailable.";
      container.appendChild(summary);
      if (hit.alignment_visualization) {
        container.appendChild(renderAlignmentDetails(hit));
      }

      container.appendChild(renderSectionTitle("Why this candidate?"));
      container.appendChild(renderWhyCandidate(hit.why_candidate));
      container.appendChild(renderNotesDetails(hit));
    }

    function renderDetailedCard(hit, index) {
      const { explicit, observed } = splitRules(hit);

      const card = document.createElement("article");
      card.className = "bg-white border border-parchment-200 rounded-xl p-5 mb-4 shadow-sm";

      const topRow = document.createElement("div");
      topRow.className = "flex items-start justify-between gap-4";

      const leftCol = document.createElement("div");
      leftCol.className = "flex-1";

      const rank = document.createElement("div");
      rank.className = "text-xs uppercase tracking-wide text-ink-muted mb-2";
      rank.textContent = "Rank " + (index + 1);

      const headword = document.createElement("div");
      headword.className = "text-2xl font-serif font-bold";
      headword.textContent = hit.headword || "N/A";

      const ipa = document.createElement("div");
      ipa.className = "text-ink-light text-sm italic mt-0.5";
      ipa.textContent = hit.ipa ? "/" + hit.ipa + "/" : "";

      leftCol.appendChild(rank);
      leftCol.appendChild(headword);
      leftCol.appendChild(ipa);
      topRow.appendChild(leftCol);

      if (typeof hit.confidence === "number") {
        topRow.appendChild(renderConfidenceBadge(hit.confidence));
      } else if (typeof hit.distance === "number") {
        topRow.appendChild(renderConfidenceBadge(1 - hit.distance));
      }

      card.appendChild(topRow);

      if (hit.dialect_attribution) {
        card.appendChild(renderDialectBadges(hit.dialect_attribution));
      }

      const meta = document.createElement("div");
      meta.className = "flex flex-wrap gap-3 mt-3";
      meta.appendChild(renderMetaBadge("Match type", hit.match_type || "Distance-only", "match"));
      meta.appendChild(renderMetaBadge("Uncertainty", hit.uncertainty || "High"));
      meta.appendChild(renderMetaBadge("Rule support", hasRuleSupport(hit) ? "Yes" : "No"));
      meta.appendChild(renderMetaBadge("Matched rules", String(hit.applied_rule_count ?? explicit.length)));
      meta.appendChild(renderMetaBadge("Fallback edits", String(hit.observed_change_count ?? observed.length)));
      card.appendChild(meta);

      appendCardBody(card, hit, { explicit, observed });
      return card;
    }

    function renderCompactCard(hit, index) {
      const { explicit, observed } = splitRules(hit);
      const card = document.createElement("details");
      card.className = "bg-white border border-parchment-200 rounded-xl p-5 mb-4 shadow-sm";

      const summaryEl = document.createElement("summary");
      summaryEl.className = "cursor-pointer select-none list-item";

      const row = document.createElement("div");
      row.className = "flex items-start justify-between gap-4";

      const left = document.createElement("div");
      left.className = "flex-1";

      const title = document.createElement("div");
      title.className = "text-xl font-serif font-bold";
      title.textContent = (index + 1) + ". " + (hit.headword || "N/A");

      const metaParts = [];
      if (typeof hit.confidence === "number" && Number.isFinite(hit.confidence)) {
        metaParts.push("confidence " + hit.confidence.toFixed(2));
      } else if (typeof hit.distance === "number" && Number.isFinite(hit.distance)) {
        metaParts.push("confidence " + (1 - hit.distance).toFixed(2));
      } else {
        metaParts.push("confidence: unknown");
      }
      metaParts.push(hit.match_type || "Distance-only");
      metaParts.push((hit.applied_rule_count ?? 0) + " matched rules");
      metaParts.push((hit.observed_change_count ?? 0) + " fallback edits");

      const meta = document.createElement("p");
      meta.className = "mt-1 text-sm text-ink-light";
      meta.textContent = metaParts.join(" · ");

      left.appendChild(title);
      left.appendChild(meta);
      row.appendChild(left);

      row.appendChild(renderMetaBadge("Uncertainty", hit.uncertainty || "High"));
      summaryEl.appendChild(row);
      card.appendChild(summaryEl);

      const body = document.createElement("div");
      body.className = "pt-4";

      const ipa = document.createElement("div");
      ipa.className = "text-ink-light text-sm italic";
      ipa.textContent = hit.ipa ? "/" + hit.ipa + "/" : "";
      body.appendChild(ipa);

      if (hit.dialect_attribution) {
        body.appendChild(renderDialectBadges(hit.dialect_attribution));
      }

      const metaDetails = document.createElement("div");
      metaDetails.className = "flex flex-wrap gap-3 mt-3";
      metaDetails.appendChild(renderMetaBadge("Match type", hit.match_type || "Distance-only", "match"));
      metaDetails.appendChild(renderMetaBadge("Rule support", hasRuleSupport(hit) ? "Yes" : "No"));
      metaDetails.appendChild(renderMetaBadge("Matched rules", String(hit.applied_rule_count ?? explicit.length)));
      metaDetails.appendChild(renderMetaBadge("Fallback edits", String(hit.observed_change_count ?? observed.length)));
      body.appendChild(metaDetails);

      appendCardBody(body, hit, { explicit, observed });
      card.appendChild(body);
      return card;
    }

    function renderResults(data) {
      const container = document.getElementById("results");
      container.replaceChildren();

      if (!data || !Array.isArray(data.hits)) {
        renderStatusMessage("No results found.");
        return;
      }
      if (!data.hits.length) {
        renderStatusMessage("No results found.");
        return;
      }

      /* Query info bar */
      if (data.query || data.query_ipa) {
        const info = document.createElement("div");
        info.className = "text-sm text-ink-muted mb-4 text-center";
        const infoParts = [];
        if (data.query) infoParts.push("Query: " + data.query);
        if (data.query_ipa) infoParts.push("/" + data.query_ipa + "/");
        info.textContent = infoParts.join(" ");
        container.appendChild(info);
      }

      // Prefer server-supplied mode; fall back to client classification.
      const queryMode = data.query_mode || classifyQueryMode(data.query || "");
      container.appendChild(renderQueryModeBanner(data.query || "", queryMode));

      const indexedHits = data.hits
        .map((hit, index) => ({ hit, index }))
        .filter(({ hit }) => hit && typeof hit === "object");

      const supported = indexedHits.filter(({ hit }) => isSupportedCandidate(hit));
      const exploratory = indexedHits.filter(({ hit }) => !isSupportedCandidate(hit));

      if (supported.length) {
        container.appendChild(
          renderGroupHeader(
            "Supported candidates",
            "Exact and rule-supported candidates are shown first."
          )
        );
        supported.forEach(({ hit, index }, groupIndex) => {
          container.appendChild(
            groupIndex < DETAILED_CARD_THRESHOLD
              ? renderDetailedCard(hit, index)
              : renderCompactCard(hit, index)
          );
        });
      }

      if (exploratory.length) {
        container.appendChild(renderExploratorySection(queryMode, exploratory));
      }
    }

    /* ------------------------------------------------------------------ */
    /* Init                                                                */
    /* ------------------------------------------------------------------ */

    document.getElementById("searchForm").addEventListener("submit", runSearch);
  </script>
</body>
</html>
