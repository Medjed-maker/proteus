name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-matrix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Validate committed matrices
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          matrix_files=(data/languages/ancient_greek/matrices/*.json)
          if [ ${#matrix_files[@]} -eq 0 ]; then
            echo "No matrix files found under data/languages/ancient_greek/matrices/"
            exit 1
          fi
          failed=false
          for matrix_file in "${matrix_files[@]}"; do
            if ! uv run python tools/validate_matrix.py "${matrix_file}"; then
              failed=true
            fi
          done
          if $failed; then
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # Generate the lexicon before tests so extractor regressions fail the job.
      - name: Prepare LSJ extractor script
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/extract-lsj.sh
          chmod +x scripts/extract-lsj.sh

      - name: Cache Perseus LSJ checkout
        uses: actions/cache@v4
        with:
          path: data/external/lsj
          key: ${{ runner.os }}-perseus-lsj-${{ hashFiles('scripts/extract-lsj.sh', 'src/phonology/build_lexicon.py') }}
          # restore-keys intentionally omitted: a partial cache hit for the LSJ
          # checkout is not useful — the step requires the exact matching tree.

      - name: Cache generated lexicon
        uses: actions/cache@v4
        with:
          path: |
            data/languages/ancient_greek/lexicon/greek_lemmas.json
            data/languages/ancient_greek/lexicon/greek_lemmas.meta.json
          key: ${{ runner.os }}-lexicon-${{ hashFiles('scripts/extract-lsj.sh', 'src/phonology/lsj_extractor.py', 'src/phonology/build_lexicon.py', 'src/phonology/ipa_converter.py', 'src/phonology/languages/ancient_greek/ipa.py', 'src/phonology/transliterate.py', 'src/phonology/betacode.py', 'data/languages/ancient_greek/lexicon/pos_overrides.yaml', 'data/languages/ancient_greek/lexicon/greek_lemmas.schema.json') }}
          # restore-keys intentionally omitted: the generated lexicon is either
          # fully current or must be regenerated; a stale partial file is useless.

      - name: Generate lexicon from Perseus LSJ
        run: bash scripts/extract-lsj.sh --if-missing

      - name: Run tests
        run: uv run pytest --tb=short -v

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore
